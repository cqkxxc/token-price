name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  SITE_DIR: frontend/site

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SITE_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.SITE_DIR }}/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: ${{ env.SITE_DIR }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://124.223.221.163

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy via rsync
        run: |
          eval $(ssh-agent -s)
          ssh-add - <<< "${{ secrets.DEPLOY_SSH_KEY }}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || '22' }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete --checksum \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_PORT || '22' }}" \
            dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"
        shell: bash
