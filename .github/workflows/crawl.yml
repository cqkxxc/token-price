name: Crawl & Deploy

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: Skip deploy, only collect and build
        type: boolean
        default: false

env:
  SITE_DIR: 页面/frontend/site

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SITE_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install --quiet httpx beautifulsoup4 lxml parsel jsonschema pyyaml

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.SITE_DIR }}/package-lock.json

      - run: npm ci

      - name: Run crawler
        run: bash crawler/run.sh
        continue-on-error: true
        env:
          KRILL_TOKEN: ${{ secrets.KRILL_TOKEN }}
          CCGUI_TOKEN: ${{ secrets.CCGUI_TOKEN }}

      - run: npm run build

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/public/data
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: auto update [skip ci]"
            git push
          fi

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: site-dist-${{ github.run_id }}
          path: ${{ env.SITE_DIR }}/dist

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() && github.event_name == 'workflow_dispatch' && !inputs.skip_deploy && secrets.DEPLOY_HOST != '' }}
    environment:
      name: production
      url: http://124.223.221.163

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: site-dist-${{ github.run_id }}
          path: dist

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --checksum
          path: dist/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          remote_port: ${{ secrets.DEPLOY_PORT || 22 }}
          pre_script: mkdir -p ${{ secrets.DEPLOY_PATH }}
