name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    name: AI Issue Triage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Generate repo tree
        id: tree
        run: |
          tree -L 3 -I 'node_modules|.git|dist|.astro|__pycache__|.vite' --charset=utf-8 > /tmp/repo-tree.txt
          echo "::group::Repository Structure"
          cat /tmp/repo-tree.txt
          echo "::endgroup::"

      - name: AI Analysis
        id: ai
        continue-on-error: true
        env:
          API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ toJson(github.event.issue.body) }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret ЮДХфжУЃЌЧыдкВжПт Settings Ёњ Secrets жаЬэМг"
            echo "? AI ЗжЮіЮДжДааЃКOPENAI_API_KEY secret ЮДХфжУЁЃЧыдкВжПт Settings Ёњ Secrets and variables Ёњ Actions жаЬэМгЁЃ" > /tmp/ai-result.md
            echo "risk_level=unknown" >> $GITHUB_OUTPUT
            echo "label=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Read repo tree
          REPO_TREE=$(cat /tmp/repo-tree.txt)

          # Read key config files
          PACKAGE_JSON=$(cat frontend/site/package.json 2>/dev/null || echo "(not found)")
          ASTRO_CONFIG=$(cat frontend/site/astro.config.mjs 2>/dev/null || echo "(not found)")
          TSCONFIG=$(cat frontend/site/tsconfig.json 2>/dev/null || echo "(not found)")
          NGINX_CONF=$(cat nginx.conf 2>/dev/null || echo "(not found)")
          CRAWLER_MAIN=$(cat crawler/main.py 2>/dev/null || echo "(not found)")
          ISSUE_BODY_B64=$(echo "$ISSUE_BODY" | base64 -w0)

          # Build user prompt
          USER_PROMPT=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg body_b64 "$ISSUE_BODY_B64" \
            --arg user "$ISSUE_USER" \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg tree "$REPO_TREE" \
            --arg pkg "$PACKAGE_JSON" \
            --arg astro "$ASTRO_CONFIG" \
            --arg ts "$TSCONFIG" \
            --arg nginx "$NGINX_CONF" \
            --arg crawler "$CRAWLER_MAIN" \
            '{
              role: "user",
              content: (
                "## Issue аХЯЂ\n\n" +
                "- БрКХ: #\($issue_number)\n" +
                "- ЬсНЛеп: \($user)\n" +
                "- БъЬт: \($title)\n\n" +
                "### Issue е§ЮФ\n---\n" + ($body_b64 | @base64d | fromjson) + "\n---\n\n" +
                "## ЯюФПДњТыПтНсЙЙ\n\n```\n" + $tree + "\n```\n\n" +
                "## ЙиМќХфжУЮФМў\n\n" +
                "### package.json\n```json\n" + $pkg + "\n```\n\n" +
                "### astro.config.mjs\n```js\n" + $astro + "\n```\n\n" +
                "### tsconfig.json\n```json\n" + $ts + "\n```\n\n" +
                "### nginx.conf\n```nginx\n" + $nginx + "\n```\n\n" +
                "### crawler/main.py\n```python\n" + $crawler + "\n```"
              )
            }')

          # Build system prompt
          SYSTEM_PROMPT=$(jq -n \
            '{
              role: "system",
              content: (
                "ФуЪЧвЛИізЪЩюММЪѕЦРЙРЙЄГЬЪІЃЌИКд№ЗжЮі GitHub IssueЃЌВЂИјГіММЪѕБфИќЗНАИМАЗчЯеЦРЙРЁЃ\n\n" +
                "## ФуЕФШЮЮё\n\n" +
                "1. РэНт Issue ЕФЮЪЬтУшЪіКЭЦкЭћааЮЊ\n" +
                "2. ИљОнЬсЙЉЕФДњТыПтЮФМўЪїКЭХфжУЮФМўЃЌЭЦЖЯФФаЉФЃПщ/ЮФМўашвЊИФЖЏ\n" +
                "3. ЪфГіММЪѕБфИќЗНАИЃЈИљвђЗжЮі + БфИќСаБэ + ЗчЯеЕуЃЉ\n" +
                "4. АД 5 ЮЌЖШЦРЗжФЃаЭЪфГіЗчЯеЦРЙР JSON\n\n" +
                "## ЕквЛВНЃКЗжЮі\n\n" +
                "- РэНт Issue УшЪіЕФЮЪЬтКЭЦкЭћааЮЊ\n" +
                "- ИљОнЮФМўЪїКЭХфжУЮФМўЭЦЖЯЯюФПМмЙЙЃЌЖЈЮЛашвЊИФЖЏЕФФЃПщ\n" +
                "- ШчЙћ Issue аХЯЂВЛзувдШЗЖЈИФЖЏЗЖЮЇЃЌУїШЗжИГіашвЊГЮЧхЕФЕу\n\n" +
                "## ЕкЖўВНЃКЪфГіММЪѕБфИќЗНАИЃЈMarkdownЃЉ\n\n" +
                "гУвдЯТНсЙЙЪфГіЃЈжаЮФЃЉЃК\n\n" +
                "### ?? ИљвђЗжЮі\n" +
                "ЕМжТЮЪЬтЕФИљвђЃЌЖЈЮЛЕНОпЬхФЃПщ/ЮФМўЃЌЫЕУїЕБЧАааЮЊКЭЦкЭћааЮЊЕФВюОрЁЃ\n\n" +
                "### ?? БфИќЗНАИ\n" +
                "вд checklist СаГіУПИіашвЊИФЖЏЕФЮФМўМАОпЬхИФЖЏФкШнЁЃИёЪНЃК\n" +
                "- [ ] `ТЗОЖ/ЮФМў` ЁЊ ИФЖЏУшЪі\n\n" +
                "### ?? ЗчЯеЕу\n" +
                "ЪЕЯжЙ§ГЬжаЕФММЪѕЗчЯеЃЌ1-3 ЬѕЁЃ\n\n" +
                "## ЕкШ§ВНЃКЪфГіЗчЯеЦРЙР JSON\n\n" +
                "АДвдЯТ 5 ЮЌЖШЦРЗжЃЌЩЯЯо 100 ЗжЁЃЕУЗждНИп = ЗчЯедНДѓЁЃЦРЗжЙцдђЃК\n\n" +
                "### 1. Ъ§ОнПтБфИќ (ШЈжи 40, Ш§МЖ: Юо/жа/Ип)\n" +
                "- Юо(0): ВЛЩцМАЪ§ОнПтЛђЪ§ОнЮФМўЃЈШч site/public/data/*.jsonЃЉ\n" +
                "- жа(20): аТдіПЩПеСаЁЂЯђКѓМцШнЕФ JSON зжЖЮаТдіЁЂаТдіЫїв§ЁЂМгЗЧзшШћдМЪј\n" +
                "- Ип(40): ALTER TABLE ЩОСа/ИФСаРраЭЁЂЩОБэЁЂЦЦЛЕад schema БфИќ\n" +
                "зЂЃКJSON Ъ§ОнЮФМўзїЮЊвЛЕШЙЋУёЁЊЁЊНіФкШнжЕИќаТ=0ЃЛИФ JSON Мќ/зжЖЮ schema=АДжаЕЕ 20 МЦШыЃЌВЂдк reason жаБъУї\"Ъ§Он schema\"ЁЃ\n\n" +
                "### 2. НгПкЦѕдМБфИќ (ШЈжи 30, Ш§МЖ: Юо/жа/Ип)\n" +
                "- Юо(0): Юо API / ДПЧАЖЫ / ВЛЖЏЙЋПЊЦѕдМ\n" +
                "- жа(15): аТдіПЩбЁзжЖЮЁЂаТдіЖЫЕуЃЈВЛЩОВЛИФЯжгаЃЉЁЂЯђКѓМцШнРЉеЙ\n" +
                "- Ип(30): ИФ path / ИФБиЬю / ЩОзжЖЮ / жиУќУћ / ИФ response НсЙЙ\n\n" +
                "### 3. КЫаФвРРЕБфИќ (ШЈжи 20, Ш§МЖ: Юо/жа/Ип)\n" +
                "- Юо(0): ЮовРРЕЮФМўИФЖЏ / НігУЯжга import гыФкжУ\n" +
                "- жа(10): package.json / requirements.txt ЕШ minor/patch Щ§МЖЃЌЗчЯеПЩПи\n" +
                "- Ип(20): в§ШыаТПђМмЛђЕкШ§ЗНПт / Пч major Щ§МЖ\n\n" +
                "### 4. гАЯьЗЖЮЇ (ЖЏЬЌ: уажЕЁСШыЖШЯЕЪ§)\n" +
                "ЯШАДИФЖЏЮФМўЪ§ШЁЛљДЁЗжЃК>10 ЮФМў=15ЃЌ5-10 ЮФМў=5ЃЌ<5 ЮФМў=0\n" +
                "дйАДЪмгАЯьЮФМўЕФвРРЕШыЖШМгШЈЃК\n" +
                "- isolated (ЁС1.0): ЮоБЛв§гУ / НіБОФЃПщздгУ\n" +
                "- shared (ЁС1.2): БЛ 1-N ИіФЃПщв§гУ\n" +
                "- core (ЁС1.5): ЖрШыПк / ПчЗўЮёЙВЯэ / ЙЋЙВЪ§ОнЦѕдМ\n" +
                "НіЭГМЦецЪЕДњТы/ТпМ­ИФЖЏЮФМўЃЌХХГ§здЖЏЩњГЩЁЂmockfileЁЂЙЙНЈВњЮяЁЃscope_score = round(file_points ЁС in_degree_factor)\n\n" +
                "### 5. ЦЦЛЕадБфИќ (ЗжМЖЗХДѓЯЕЪ§)\n" +
                "- Юо(ЁС1.0): ЮоЦЦЛЕадБфИќ\n" +
                "- ФкВП(ЁС1.2): НіФкВПЫНгаКЏЪ§/РрЧЉУћБфЛЏ\n" +
                "- ФкЙЋПЊ(ЁС1.5): ВжПтФк export ЙЋПЊЗћКХБЛЩО/ИФУћ/БиВЮБфЛЏ\n" +
                "- ЭтЦѕдМ(ЁС1.8): ЭтВП API / ПчЗўЮёЦѕдМ / ЙЋПЊРраЭЦЦЛЕ\n" +
                "- ЩОФмСІ(ЁС2.0): ЩОГ§вбЗЂВМФмСІЧвЮо deprecationЃЌВЂЧПжЦХаЮЊИпЗчЯе\n\n" +
                "### НЛЛЅЯюЁЊВПЪ№ЫГађ\n" +
                "ЕБ db ЕЕЮЛ Ён жа Чв api ЕЕЮЛ Ён жаЃЌЫЕУїЧЈвЦгыНгПкаыЭЌађВПЪ№ЃЌЖюЭт +10ЃЌВЂдк reason жаБъУї"deploy-ordering"ЁЃ\n\n" +
                "### змЗжЙЋЪН\n" +
                "base = db_score + api_score + dep_score + scope_score\n" +
                "interaction = 0 | 10 (deploy-ordering ДЅЗЂ)\n" +
                "post = (base + interaction) ЁС breaking_multiplier\n" +
                "final = min(post, 100)\n\n" +
                "### ЗжЪ§ЕШМЖ\n" +
                "- 0-20: ЕЭЗчЯе\n" +
                "- 21-50: жаЗчЯе\n" +
                "- 51-100: ИпЗчЯе\n" +
                "ЩОФмСІ breaking ЕЕЧПжЦ level=ИпЗчЯеЃЌЮоЪгзюжеЗжЪ§ЁЃ\n\n" +
                "## ЪфГі JSON ИёЪН\n\n" +
                "## ЦРТлФЉЮВИёЪНЃЈБиаыбЯИёзёЪиЃЉ\n\n" +
                "е§ЮФНсЪјКѓСэЦ№вЛаааД `<!-- @risk-json -->`ЃЌШЛКѓНєНгзХЗХвЛИі ```json ДњТыПщЁЃ\n" +
                "ДЫ JSON ПщНігУгкздЖЏЬсШЁЗчЯеБъЧЉЃЌВЛЛсЯдЪОдкЦРТлЧјЁЃ\n" +
                "ИёЪН: {\"summary\": {\"level\": \"ЕЭЗчЯе\", \"suggested_action\": \"ЪЕЯж\"}}\n" +
                "НћжЙдкЦРТлЧјЪфГі @risk-json ПщвдЭтЕФШЮКЮ JSONЁЃ\n\n" +
                "## ЗчЯе JSON ФЃАх\n\n" +
                "НЋ JSON ЗХдк ```json ДњТыПщжаЃК\n\n" +
                "```json\n" +
                "{\n" +
                "  \"schema_version\": 2,\n" +
                "  \"issue\": \"#БрКХ\",\n" +
                "  \"title\": \"Issue БъЬт\",\n" +
                "  \"confidence\": \"high|medium|low\",\n" +
                "  \"total_score\": 0-100,\n" +
                "  \"dimensions\": [\n" +
                "    {\"dimension\": \"Ъ§ОнПтБфИќ\", \"risk_level\": \"ЮоЗчЯе\", \"weight\": 40, \"tier\": \"Юо|жа|Ип\", \"applicable\": true, \"score\": 0-40, \"reason\": \"МђЪіРэгЩ\"},\n" +
                "    {\"dimension\": \"НгПкЦѕдМБфИќ\", \"risk_level\": \"ЮоЗчЯе\", \"weight\": 30, \"tier\": \"Юо|жа|Ип\", \"applicable\": true, \"score\": 0-30, \"reason\": \"МђЪіРэгЩ\"},\n" +
                "    {\"dimension\": \"КЫаФвРРЕБфИќ\", \"risk_level\": \"ЮоЗчЯе\", \"weight\": 20, \"tier\": \"Юо|жа|Ип\", \"applicable\": true, \"score\": 0-20, \"reason\": \"МђЪіРэгЩ\"},\n" +
                "    {\"dimension\": \"гАЯьЗЖЮЇ\", \"risk_level\": \"ЖЏЬЌЗж\", \"weight\": \"уажЕЁСШыЖШ\", \"tier\": \"isolated|shared|core\", \"applicable\": true, \"score\": 0-22, \"reason\": \"ЮФМўЪ§ + ШыЖШ\"},\n" +
                "    {\"dimension\": \"ЦЦЛЕадБфИќ\", \"risk_level\": \"ЗжМЖЗХДѓ\", \"weight\": \"multiplier\", \"tier\": \"Юо|ФкВП|ФкЙЋПЊ|ЭтЦѕдМ|ЩОФмСІ\", \"multiplier\": 1.0-2.0, \"applicable\": true, \"reason\": \"МђЪіРэгЩ\"}\n" +
                "  ],\n" +
                "  \"interaction\": 0-10,\n" +
                "  \"summary\": {\n" +
                "    \"level\": \"ЕЭЗчЯе|жаЗчЯе|ИпЗчЯе\",\n" +
                "    \"conclusion\": \"вЛОфЛАНсТл\",\n" +
                "    \"suggested_action\": \"ЪЕЯж|ашЦРЙР|БфИќЗНАИ|зшЖЯ\"\n" +
                "  }\n" +
                "}\n" +
                "```\n\n" +
                "## живЊЙцдђ\n" +
                "- ЦРЗжБиаыгаОнПЩвРЃЌВЛвЊЦОИаОѕ\n" +
                "- confidence БъзЂФуЖдЗжЮіЕФАбЮеЖШЃКhigh=вбУїШЗЖЈЮЛЕНЮФМў/ФЃПщЃЌmedium=ДѓжТЖЈЮЛЕЋЮДЧюОЁПЩФмТЗОЖЃЌlow=НіЛљгк Issue УшЪіЭЦЖЯ\n" +
                "- БфИќЗНАИвЊОпЬхЁЂПЩжДаа\n" +
                "- ШчЙћ Issue аХЯЂВЛзуЃЌдкИљвђЗжЮіжажИГіашвЊГЮЧхЕФЕу\n" +
                "- ЫљгаЪфГіЪЙгУжаЮФ"
              )
            }')

          # Build messages array for chat/completions
          MESSAGES=$(jq -n -c \
            --argjson sys "$SYSTEM_PROMPT" \
            --argjson user "$USER_PROMPT" \
            '[ $sys, $user ]')

          echo "::group::Calling AI API"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://opencode.ai/zen/go/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$(jq -n \
              --argjson messages "$MESSAGES" \
              '{
                model: "deepseek-v4-pro",
                max_tokens: 4096,
                temperature: 0.1,
                messages: $messages
              }')" \
            --max-time 120)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::AI API ЕїгУЪЇАм (HTTP $HTTP_CODE)"
            echo "? AI ЗжЮіЪЇАм (HTTP $HTTP_CODE)ЃЌЧыЪжЖЏВщПДДЫ IssueЁЃ" > /tmp/ai-result.md
            echo "risk_level=unknown" >> $GITHUB_OUTPUT
            echo "label=" >> $GITHUB_OUTPUT
            echo "::endgroup::"
            exit 0
          fi

          # Extract content from response
          RESULT=$(echo "$BODY" | jq -r '.choices[0].message.content // empty')

          if [ -z "$RESULT" ]; then
            echo "::warning::AI API ЗЕЛиСЫПеФкШн"
            echo "? AI ЗЕЛиСЫПеФкШнЃЌЧыЪжЖЏВщПДДЫ IssueЁЃ" > /tmp/ai-result.md
            echo "risk_level=unknown" >> $GITHUB_OUTPUT
            echo "label=" >> $GITHUB_OUTPUT
            echo "::endgroup::"
            exit 0
          fi

          echo "::endgroup::"

          # Extract risk level from JSON block in the response
          JSON_BLOCK=$(echo "$RESULT" | sed -n '/^<!-- @risk-json -->$/,$p' | sed -n '/```json/,/```/p' | sed '1d;$d')
          RISK_LEVEL=$(echo "$JSON_BLOCK" | jq -r '.summary.level // "unknown"' 2>/dev/null || echo "unknown")
          CLEAN_REVIEW=$(echo "$RESULT" | sed '/^<!-- @risk-json -->$/,$d')

          # Map Chinese risk level to label suffix
          case "$RISK_LEVEL" in
            "ИпЗчЯе") LABEL="risk:high" ;;
            "жаЗчЯе") LABEL="risk:medium" ;;
            "ЕЭЗчЯе") LABEL="risk:low" ;;
            *)       LABEL="" ;;
          esac

          echo "risk_level=$RISK_LEVEL" >> $GITHUB_OUTPUT
          echo "label=$LABEL" >> $GITHUB_OUTPUT

          # Write result to file for comment step
          echo "$CLEAN_REVIEW" > /tmp/ai-result.md

      - name: Post comment on issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body-file: /tmp/ai-result.md

      - name: Apply risk label
        if: steps.ai.outputs.label != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL: ${{ steps.ai.outputs.label }}
        run: |
          echo "Applying label: $LABEL"
          LABEL_COLOR=""
          case "$LABEL" in
            "risk:high")   LABEL_COLOR="dc2626" ;;  # red
            "risk:medium") LABEL_COLOR="f59e0b" ;;  # amber
            "risk:low")    LABEL_COLOR="22c55e" ;;  # green
          esac

          # Create label if it doesn't exist
          gh label create "$LABEL" --color "$LABEL_COLOR" --description "AI ЗчЯеЦРЙР" 2>/dev/null || true

          # Apply label to issue
          gh issue edit "${{ github.event.issue.number }}" --add-label "$LABEL"
